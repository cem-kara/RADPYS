version: "3.9"

services:
  api:
    build: ./apps/api
    env_file: .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build: ./apps/web
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web:/app
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    depends_on:
      - api
